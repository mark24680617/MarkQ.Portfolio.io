<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="author" content="Mark Qiu">
  <meta name="description" content="Photography Gallery — Mark Qiu">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400;1,500&family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
  <title>Gallery — Mark Qiu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }
    #gallery-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: grab;
    }
    #gallery-canvas:active { cursor: grabbing; }
    #genre-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      mix-blend-mode: exclusion;
      z-index: 10;
      padding: 0 1rem;
    }
    #genre-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(3rem, 8vw, 7rem);
      color: #fff;
      letter-spacing: 0.02em;
      white-space: nowrap;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    #genre-text.fade-out {
      opacity: 0;
      transform: translateY(-12px);
    }
    #back-link {
      position: fixed;
      top: 20px;
      left: 24px;
      z-index: 20;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
      opacity: 0.6;
      transition: opacity 0.3s;
      letter-spacing: -0.02em;
    }
    #back-link:hover, #back-link:focus { opacity: 1; }
    #loading {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      transition: opacity 0.6s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loading-inner { text-align: center; }
    .loading-logo { font-weight: 900; font-size: 2rem; margin-bottom: 24px; letter-spacing: -0.03em; }
    .loading-track { width: 180px; height: 2px; background: rgba(255,255,255,0.1); margin: 0 auto; overflow: hidden; }
    .loading-bar { height: 100%; width: 0%; background: #fff; transition: width 0.2s ease; }
    .loading-pct { margin-top: 14px; font-size: 0.7rem; letter-spacing: 0.15em; opacity: 0.4; }
    #nav-hint {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      z-index: 10;
      text-align: center;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      transition: opacity 1.5s ease;
    }
    #nav-hint.hidden { opacity: 0; pointer-events: none; }
    @media (max-width: 480px) {
      #back-link { top: 14px; left: 16px; font-size: 0.95rem; }
      #nav-hint { bottom: 16px; font-size: 0.55rem; }
    }
  </style>
</head>
<body>
  <canvas id="gallery-canvas"></canvas>
  <div id="genre-overlay"><h1 id="genre-text"></h1></div>
  <a href="index.html" id="back-link" aria-label="Back to portfolio">&larr; MQ.</a>
  <div id="nav-hint">Scroll &middot; Arrow Keys &middot; Touch</div>
  <div id="loading">
    <div class="loading-inner">
      <div class="loading-logo">MQ.</div>
      <div class="loading-track"><div class="loading-bar" id="loading-bar"></div></div>
      <div class="loading-pct" id="loading-pct">0%</div>
    </div>
  </div>
  <noscript><p style="color:#fff;text-align:center;padding:40px;">JavaScript is required. <a href="index.html" style="color:#fff;">Return to portfolio</a></p></noscript>
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.165.0"
    }
  }
  </script>
  <script type="module" src="./gallery.js"></script>
</body>
</html>
